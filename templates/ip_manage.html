{% extends "base.html" %}

{% block extra_css %}
<style>
.ip-toolbar { margin-bottom: 15px; }
</style>
{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header"><i class="layui-icon layui-icon-engine" style="margin-right:5px;"></i>住宅IP管理</div>
    <div class="layui-card-body">
        <!-- 工具栏 -->
        <div class="ip-toolbar layui-row layui-col-space10">
            <div class="layui-col-md3">
                <input type="text" id="search-ip" placeholder="搜索IP地址..." class="layui-input">
            </div>
            <div class="layui-col-md2">
                <select id="filter-status">
                    <option value="">全部状态</option>
                    <option value="1">正常</option>
                    <option value="2">已分配</option>
                    <option value="0">禁用</option>
                    <option value="3">失效</option>
                </select>
            </div>
            <div class="layui-col-md2">
                <button class="layui-btn layui-btn-primary" id="btn-search"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            </div>
            <div class="layui-col-md5" style="text-align: right;">
                <button class="layui-btn layui-btn-sm layui-btn-primary" id="btn-batch-import"><i class="layui-icon layui-icon-upload"></i> 批量导入</button>
                <button class="layui-btn layui-btn-sm" id="btn-add-ip"><i class="layui-icon layui-icon-add-1"></i> 新增IP</button>
            </div>
        </div>

        <!-- IP 表格 -->
        <table id="ip-table" lay-filter="ip-table"></table>
    </div>
</div>

<!-- 行操作模板 -->
{% raw %}
<script type="text/html" id="row-toolbar">
    <button class="layui-btn layui-btn-xs" lay-event="edit">编辑</button>
    {{# if(d.status == 1){ }}
    <button class="layui-btn layui-btn-xs layui-btn-primary" lay-event="disable">禁用</button>
    {{# } else if(d.status == 0){ }}
    <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="enable">启用</button>
    {{# } }}
    <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</button>
</script>
{% endraw %}

<!-- 新增/编辑 IP 弹窗模板 -->
<script type="text/html" id="ip-dialog-tpl">
<div style="padding:20px;">
    <form class="layui-form" lay-filter="ip-form">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <label class="layui-form-label">IP地址 *</label>
            <div class="layui-input-block">
                <input type="text" name="ip" lay-verify="required" placeholder="住宅IP地址" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">端口 *</label>
            <div class="layui-input-block">
                <input type="number" name="port" lay-verify="required" placeholder="端口号" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">代理账号</label>
            <div class="layui-input-block">
                <input type="text" name="proxy_user" placeholder="用户名（可选）" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">代理密码</label>
            <div class="layui-input-block">
                <input type="text" name="proxy_pwd" placeholder="密码（可选）" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">地区</label>
            <div class="layui-input-block">
                <input type="text" name="area" placeholder="如 US / UK / JP" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注</label>
            <div class="layui-input-block">
                <textarea name="remark" placeholder="备注信息" class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: center;">
            <button class="layui-btn" lay-submit lay-filter="submit-ip">保存</button>
            <button type="button" class="layui-btn layui-btn-primary" onclick="layui.layer.closeAll()">取消</button>
        </div>
    </form>
</div>
</script>
{% endblock %}

{% block extra_js %}
{% raw %}
<script>
layui.use(['table', 'form', 'upload'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var upload = layui.upload;
    var IP_DIALOG_HTML = $('#ip-dialog-tpl').html();

    // 渲染表格
    var tableIns = table.render({
        elem: '#ip-table',
        url: '/api/ip/list',
        page: true,
        limit: 20,
        toolbar: true,
        defaultToolbar: ['filter', 'exports'],
        cols: [[
            {field:'id', title:'ID', width:65, sort:true},
            {field:'ip', title:'IP地址', width:150},
            {field:'port', title:'端口', width:70},
            {field:'proxy_user', title:'代理账号', width:120, templet:function(d){
                return d.proxy_user || '-';
            }},
            {field:'area', title:'地区', width:70},
            {field:'ip_type', title:'类型', width:90},
            {field:'status_text', title:'状态', width:80, templet:function(d){
                if(d.status==1) return '<span class="layui-badge layui-bg-green">正常</span>';
                if(d.status==2) return '<span class="layui-badge layui-bg-blue">已分配</span>';
                if(d.status==0) return '<span class="layui-badge">禁用</span>';
                return '<span class="layui-badge layui-bg-red">失效</span>';
            }},
            {field:'remark', title:'备注', width:120},
            {field:'create_time', title:'添加时间', width:170},
            {title:'操作', toolbar:'#row-toolbar', width:220, fixed:'right'}
        ]]
    });

    // 搜索
    $('#btn-search').on('click', function(){
        tableIns.reload({
            where: {ip: $('#search-ip').val(), status: $('#filter-status').val()},
            page: {curr: 1}
        });
    });

    // 新增IP
    $('#btn-add-ip').on('click', function(){
        layer.open({
            type: 1,
            title: '新增住宅IP',
            area: ['520px', '460px'],
            content: IP_DIALOG_HTML,
            success: function(layero){
                form.val('ip-form', {});
                form.render(null, 'ip-form');
            }
        });
    });

    // 批量导入
    upload.render({
        elem: '#btn-batch-import',
        url: '/api/ip/batch_import',
        accept: 'file',
        exts: 'csv|jsonl',
        before: function(){
            this.idx = layer.msg('导入中...', {icon:16, shade:0.3, time:0});
        },
        done: function(res){
            layer.close(this.idx);
            if(res.code === 0){
                layer.msg(res.msg, {icon:1, time:3000}, function(){ tableIns.reload(); });
            } else {
                layer.msg(res.msg, {icon:2, time:5000});
            }
        },
        error: function(){
            layer.close(this.idx);
            layer.msg('上传失败', {icon:2});
        }
    });

    // 行操作
    table.on('tool(ip-table)', function(obj){
        var data = obj.data;
        if(obj.event === 'edit'){
            layer.open({
                type: 1,
                title: '编辑IP #' + data.id,
                area: ['520px', '460px'],
                content: IP_DIALOG_HTML,
                success: function(layero){
                    form.val('ip-form', {
                        'id': data.id,
                        'ip': data.ip,
                        'port': data.port,
                        'proxy_user': data.proxy_user,
                        'proxy_pwd': data.proxy_pwd,
                        'area': data.area,
                        'remark': data.remark
                    });
                    form.render(null, 'ip-form');
                }
            });
        }
        else if(obj.event === 'del'){
            layer.confirm('确定删除此IP？解除关联不可恢复。', function(idx){
                $.post('/api/ip/delete', {id: data.id}, function(res){
                    if(res.code === 0){
                        layer.msg('已删除', {icon:1});
                        tableIns.reload();
                    } else {
                        layer.msg(res.msg || '删除失败', {icon:2});
                    }
                });
                layer.close(idx);
            });
        }
        else if(obj.event === 'disable'){
            $.post('/api/ip/status', {id: data.id, status: 0}, function(res){
                if(res.code === 0){
                    layer.msg('已禁用', {icon:1});
                    tableIns.reload();
                } else {
                    layer.msg(res.msg, {icon:2});
                }
            });
        }
        else if(obj.event === 'enable'){
            $.post('/api/ip/status', {id: data.id, status: 1}, function(res){
                if(res.code === 0){
                    layer.msg('已启用', {icon:1});
                    tableIns.reload();
                } else {
                    layer.msg(res.msg, {icon:2});
                }
            });
        }
    });

    // 提交表单
    form.on('submit(submit-ip)', function(data){
        var field = data.field;
        $.ajax({
            url: '/api/ip/save',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(field),
            success: function(res){
                if(res.code === 0){
                    layer.msg('保存成功', {icon:1});
                    layer.closeAll();
                    tableIns.reload();
                } else {
                    layer.msg(res.msg || '保存失败', {icon:2});
                }
            }
        });
        return false;
    });
});
</script>
{% endraw %}
{% endblock %}
