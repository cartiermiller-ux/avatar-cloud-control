{% extends "base.html" %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header"><i class="layui-icon layui-icon-release" style="margin-right:5px;"></i>矩阵群发</div>
    <div class="layui-card-body">
        <table id="tasks-table" lay-filter="tasks-table"></table>
    </div>
</div>

<!-- 表头工具栏 -->
<script type="text/html" id="table-toolbar">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="create"><i class="layui-icon layui-icon-add-1"></i> 创建群发任务</button>
        <button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="refresh"><i class="layui-icon layui-icon-refresh-1"></i> 刷新</button>
    </div>
</script>

<!-- 行内工具栏 -->
{% raw %}
<script type="text/html" id="row-toolbar">
    <button class="layui-btn layui-btn-xs" lay-event="view">查看</button>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="start" id="start-{{ d.id }}">启动</a>
    <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="pause" id="pause-{{ d.id }}">暂停</a>
</script>
{% endraw %}

<!-- 创建任务对话框模板 -->
<script type="text/html" id="task-dialog-tpl">
<div style="padding:20px;">
    <form class="layui-form" lay-filter="task-form">
        <div class="layui-form-item">
            <label class="layui-form-label">任务名称 *</label>
            <div class="layui-input-block">
                <input type="text" name="name" required lay-verify="required" placeholder="输入任务名称" class="layui-input">
            </div>
        </div>

        <!-- 消息类型选择 -->
        <div class="layui-form-item">
            <label class="layui-form-label">消息类型</label>
            <div class="layui-input-block">
                <select name="task_type" lay-filter="taskTypeFilter">
                    <option value="text">纯文本</option>
                    <option value="image">图片消息</option>
                    <option value="link">链接消息</option>
                    <option value="image_link">图片+链接</option>
                </select>
            </div>
        </div>

        <!-- 群发内容：文本/链接 -->
        <div class="layui-form-item" id="textContentDiv">
            <label class="layui-form-label">群发内容</label>
            <div class="layui-input-block">
                <textarea name="content" lay-verify="required" placeholder="输入要群发的消息内容/链接" class="layui-textarea" rows="5"></textarea>
            </div>
        </div>

        <!-- 图片上传 -->
        <div class="layui-form-item" id="imageUploadDiv" style="display:none;">
            <label class="layui-form-label">上传图片</label>
            <div class="layui-input-block">
                <div class="layui-upload">
                    <button type="button" class="layui-btn layui-btn-normal" id="uploadBtn">选择图片</button>
                    <div class="layui-upload-list" style="margin-top:10px;">
                        <img class="layui-upload-img" id="previewImg" style="width:100px;height:100px;display:none;object-fit:cover;border:1px solid #ddd;">
                        <p id="uploadText" style="margin-top:5px;"></p>
                    </div>
                </div>
                <input type="hidden" name="image_path" id="imagePathInput">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">选择账号 *</label>
            <div class="layui-input-block">
                <select name="account_ids" multiple lay-verify="required" id="account-select">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">目标号码 *</label>
            <div class="layui-input-block">
                <textarea name="target_numbers" required lay-verify="required" placeholder="输入目标号码，每行一个（格式：+1234567890）" class="layui-textarea" rows="8"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block" style="margin-left:0 !important;text-align:center;">
                <button class="layui-btn" lay-submit lay-filter="save-task">创建并启动</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll()">取消</button>
            </div>
        </div>
    </form>
</div>
</script>

<!-- 任务详情对话框模板 -->
<script type="text/html" id="task-detail-dialog-tpl">
    <div class="task-detail-content" style="padding:20px;"></div>
</script>
{% endblock %}

{% block extra_js %}
{% raw %}
<script>
layui.use(['table', 'form', 'upload', 'layer'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var upload = layui.upload;

    var DIALOG_HTML = $('#task-dialog-tpl').html();

    // 1. 图片上传组件
    var uploadInst = upload.render({
        elem: '#uploadBtn',
        url: '/api/upload/image',
        accept: 'images',
        exts: 'jpg|jpeg|png|gif|bmp',
        done: function(res){
            if(res.code === 0){
                $('#imagePathInput').val(res.data.path);
                $('#previewImg').attr('src', res.data.url).show();
                $('#uploadText').text('上传成功').css('color', '#5FB878');
            } else {
                $('#uploadText').text('上传失败：' + (res.msg || '未知错误')).css('color', '#FF5722');
            }
        },
        error: function(){
            $('#uploadText').text('上传异常，请重试').css('color', '#FF5722');
        }
    });

    // 2. 消息类型切换
    form.on('select(taskTypeFilter)', function(data){
        var type = data.value;
        if(type === 'image' || type === 'image_link'){
            $('#imageUploadDiv').show();
        } else {
            $('#imageUploadDiv').hide();
        }
        // 链接类型也需要显示文本内容
        if(type === 'text' || type === 'link'){
            $('#textContentDiv').show();
        } else if(type === 'image'){
            $('#textContentDiv').hide();
        } else if(type === 'image_link'){
            $('#textContentDiv').show();
        }
    });

    var tableIns = table.render({
        elem: '#tasks-table',
        url: '/api/matrix/tasks',
        page: true,
        limit: 20,
        toolbar: '#table-toolbar',
        cols: [[
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'name', title: '任务名称'},
            {field: 'task_type', title: '类型', width: 100, templet: function(d){
                var types = {'text':'文本', 'image':'图片', 'link':'链接', 'image_link':'图+文'};
                return types[d.task_type] || d.task_type || '文本';
            }},
            {field: 'status', title: '状态', width: 100, templet: function(d){
                if(d.status == 0) return '<span class="layui-badge">待发送</span>';
                if(d.status == 1) return '<span class="layui-badge layui-bg-blue">发送中</span>';
                if(d.status == 2) return '<span class="layui-badge layui-bg-green">完成</span>';
                if(d.status == 3) return '<span class="layui-badge layui-bg-orange">暂停</span>';
                return '<span class="layui-badge">未知</span>';
            }},
            {field: 'total_count', title: '总数', width: 80},
            {field: 'sent_count', title: '已发送', width: 90},
            {field: 'failed_count', title: '失败', width: 80},
            {field: 'sent_count', title: '进度', width: 150, templet: function(d){
                var p = d.total_count > 0 ? Math.round((d.sent_count / d.total_count) * 100) : 0;
                return '<div class="layui-progress" lay-percent="'+p+'%"><div class="layui-progress-bar" lay-percent="'+p+'%"></div></div>';
            }},
            {field: 'created_at', title: '创建时间', width: 170, templet: function(d){ return formatTime(d.created_at); }},
            {title: '操作', toolbar: '#row-toolbar', width: 220, fixed: 'right'}
        ]],
        done: function(){
            layui.element.init();
        }
    });

    table.on('toolbar(tasks-table)', function(obj){
        if(obj.event === 'create') showCreateDialog();
        else if(obj.event === 'refresh') tableIns.reload();
    });

    table.on('tool(tasks-table)', function(obj){
        if(obj.event === 'view') viewTask(obj.data.id);
        else if(obj.event === 'start') startTask(obj.data.id);
        else if(obj.event === 'pause') pauseTask(obj.data.id);
    });

    function loadAccounts(){
        $.get('/api/accounts', function(res){
            var options = '<option value="">请选择账号</option>';
            if(res.data && res.data.length > 0){
                $.each(res.data, function(i, item){
                    options += '<option value="'+item.id+'">'+item.username+'</option>';
                });
            }
            $('#account-select').html(options);
            form.render('select');
        });
    }

    function showCreateDialog(){
        layer.open({
            type: 1,
            title: '创建群发任务',
            content: DIALOG_HTML,
            area: ['600px', '580px'],
            success: function(layero){
                form.render(null, 'task-form');
                loadAccounts();
                // 重新渲染上传组件（因为内容是动态加载的）
                upload.render({
                    elem: layero.find('#uploadBtn'),
                    url: '/api/upload/image',
                    accept: 'images',
                    done: function(res){
                        if(res.code === 0){
                            layero.find('#imagePathInput').val(res.data.path);
                            layero.find('#previewImg').attr('src', res.data.url).show();
                            layero.find('#uploadText').text('上传成功').css('color', '#5FB878');
                        } else {
                            layero.find('#uploadText').text('上传失败：' + (res.msg || '')).css('color', '#FF5722');
                        }
                    }
                });
            }
        });
    }

    function viewTask(id){
        var idx = showLoading('加载中...');
        $.get('/api/matrix/tasks/' + id, function(res){
            hideLoading(idx);
            if(res.code == 0){
                var t = res.data;
                var html = '<div class="layui-row layui-col-space10">';
                html += '<div class="layui-col-md6"><p><strong>任务名称：</strong>'+t.name+'</p><p><strong>类型：</strong>'+ (t.task_type||'text') +'</p><p><strong>状态：</strong>'+t.status+'</p><p><strong>总数：</strong>'+t.total_count+'</p></div>';
                html += '<div class="layui-col-md6"><p><strong>已发送：</strong>'+t.sent_count+'</p><p><strong>失败：</strong>'+t.failed_count+'</p><p><strong>创建时间：</strong>'+formatTime(t.created_at)+'</p></div>';
                html += '</div><hr><h3>群发内容</h3><div style="padding:10px;background:#f2f2f2;border-radius:4px;">'+(t.content||'')+'</div>';
                if(t.image_path){
                    html += '<hr><h3>图片</h3><div><img src="/' + t.image_path + '" style="max-width:200px;"></div>';
                }
                layer.open({
                    type: 1,
                    title: '任务详情',
                    content: $('#task-detail-dialog-tpl').html(),
                    area: ['700px', '500px'],
                    success: function(layero){
                        layero.find('.task-detail-content').html(html);
                    }
                });
            } else {
                layer.msg(res.msg || '加载失败', {icon:2});
            }
        });
    }

    function startTask(id){
        layer.confirm('确定启动该任务？', function(index){
            $.post('/api/matrix/start', {id:id}, function(res){
                if(res.code == 0){ layer.msg('任务已启动', {icon:1}); tableIns.reload(); }
                else layer.msg(res.msg || '启动失败', {icon:2});
            });
            layer.close(index);
        });
    }

    function pauseTask(id){
        layer.confirm('确定暂停该任务？', function(index){
            $.post('/api/matrix/pause', {id:id}, function(res){
                if(res.code == 0){ layer.msg('任务已暂停', {icon:1}); tableIns.reload(); }
                else layer.msg(res.msg || '暂停失败', {icon:2});
            });
            layer.close(index);
        });
    }

    form.on('submit(save-task)', function(data){
        var formData = data.field;
        formData.account_ids = $('#account-select').val();
        if(!formData.account_ids || formData.account_ids.length === 0){
            layer.msg('请选择至少一个账号', {icon:2});
            return false;
        }
        formData.target_numbers = formData.target_numbers.split('\n').filter(function(n){ return n.trim(); });

        // 图片类型校验
        var taskType = formData.task_type || 'text';
        if((taskType === 'image' || taskType === 'image_link') && !formData.image_path){
            layer.msg('请上传图片', {icon:2});
            return false;
        }

        $.ajax({
            url:'/api/matrix/create',
            type:'POST',
            contentType:'application/json',
            data: JSON.stringify(formData),
            success: function(res){
                if(res.code == 0){
                    layer.msg('任务创建成功', {icon:1});
                    layer.closeAll();
                    tableIns.reload();
                }
                else layer.msg(res.msg || '创建失败', {icon:2});
            },
            error: function(){
                layer.msg('请求失败，请检查网络', {icon:2});
            }
        });
        return false;
    });
});
</script>
{% endraw %}
{% endblock %}
