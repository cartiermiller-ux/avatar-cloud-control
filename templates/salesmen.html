{% extends "base.html" %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header"><i class="layui-icon layui-icon-user" style="margin-right:5px;"></i>业务员管理</div>
    <div class="layui-card-body">
        <!-- 搜索栏 -->
        <div class="layui-row layui-col-space10" style="margin-bottom:15px;">
            <div class="layui-col-md4">
                <input type="text" id="search-salesman" placeholder="搜索姓名/工号..." class="layui-input">
            </div>
            <div class="layui-col-md2">
                <button class="layui-btn layui-btn-primary" id="btn-search"><i class="layui-icon layui-icon-search"></i> 搜索</button>
            </div>
            <div class="layui-col-md6" style="text-align:right;">
                <button class="layui-btn layui-btn-sm" id="btn-export"><i class="layui-icon layui-icon-export"></i> 导出数据</button>
            </div>
        </div>

        <table id="salesmen-table" lay-filter="salesmen-table"></table>
    </div>
</div>

<!-- 表头工具栏 -->
<script type="text/html" id="table-toolbar">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-normal layui-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i> 添加业务员</button>
        <button class="layui-btn layui-btn-warm layui-btn-sm" lay-event="refresh"><i class="layui-icon layui-icon-refresh-1"></i> 刷新</button>
    </div>
</script>

<!-- 行内工具栏 -->
<script type="text/html" id="row-toolbar">
    <button class="layui-btn layui-btn-xs" lay-event="edit">编辑</button>
    <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="performance">业绩</button>
    <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</button>
</script>

<!-- 添加/编辑业务员对话框模板 -->
<script type="text/html" id="salesman-dialog-tpl">
    <form class="layui-form" id="salesman-form" lay-filter="salesman-form" style="padding:20px;">
        <input type="hidden" name="id" id="salesman-id">
        <div class="layui-form-item">
            <label class="layui-form-label">姓名 *</label>
            <div class="layui-input-block">
                <input type="text" name="name" id="salesman-name" required lay-verify="required" placeholder="输入姓名" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">工号 *</label>
            <div class="layui-input-block">
                <input type="text" name="employee_id" id="salesman-employee-id" required lay-verify="required" placeholder="输入工号" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">手机号</label>
            <div class="layui-input-block">
                <input type="text" name="phone" id="salesman-phone" placeholder="输入手机号" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">邮箱</label>
            <div class="layui-input-block">
                <input type="email" name="email" id="salesman-email" placeholder="输入邮箱" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分配账号</label>
            <div class="layui-input-block">
                <select name="account_ids" multiple id="account-select">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="checkbox" name="is_active" id="salesman-active" lay-skin="switch" lay-text="在职|离职" checked>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn" lay-submit lay-filter="save-salesman">保存</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="layui.layer.closeAll()">取消</button>
            </div>
        </div>
    </form>
</script>

<!-- 业绩详情对话框模板 -->
<script type="text/html" id="performance-dialog-tpl">
    <div id="performance-content" style="padding:20px;"></div>
</script>
{% endblock %}

{% block extra_js %}
{% raw %}
<script>
layui.use(['table', 'form'], function(){
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var SALESMAN_DIALOG_HTML = $('#salesman-dialog-tpl').html();
    var PERFORMANCE_DIALOG_HTML = $('#performance-dialog-tpl').html();

    var tableIns = table.render({
        elem: '#salesmen-table',
        url: '/api/salesmen',
        page: true,
        limit: 20,
        toolbar: '#table-toolbar',
        cols: [[
            {field: 'id', title: 'ID', width: 80, sort: true},
            {field: 'name', title: '姓名'},
            {field: 'employee_id', title: '工号'},
            {field: 'phone', title: '手机号', templet: function(d){ return d.phone || '-'; }},
            {field: 'account_count', title: '负责账号数', width: 110, templet: function(d){ return d.account_count || 0; }},
            {field: 'monthly_performance', title: '本月业绩', width: 110, templet: function(d){ return d.monthly_performance || 0; }},
            {field: 'is_active', title: '状态', width: 100, templet: function(d){
                return d.is_active == 1 ? '<span class="layui-badge layui-bg-green">在职</span>' : '<span class="layui-badge">离职</span>';
            }},
            {title: '操作', toolbar: '#row-toolbar', width: 200, fixed: 'right'}
        ]]
    });

    $('#btn-search').on('click', function(){
        tableIns.reload({where: {search: $('#search-salesman').val()}, page: {curr: 1}});
    });

    $('#btn-export').on('click', function(){ layer.msg('导出功能开发中...', {icon:0}); });

    table.on('toolbar(salesmen-table)', function(obj){
        if(obj.event === 'add') showAddDialog();
        else if(obj.event === 'refresh') tableIns.reload();
    });

    table.on('tool(salesmen-table)', function(obj){
        if(obj.event === 'edit') editSalesman(obj.data.id);
        else if(obj.event === 'performance') viewPerformance(obj.data.id);
        else if(obj.event === 'del') deleteSalesman(obj.data.id);
    });

    function loadAccounts(layero){
        $.get('/api/accounts', function(res){
            var options = '<option value="">请选择账号</option>';
            if(res.data && res.data.length > 0){
                $.each(res.data, function(i, item){
                    options += '<option value="'+item.id+'">'+item.username+'</option>';
                });
            }
            if(layero) layero.find('#account-select').html(options);
            else $('#account-select').html(options);
            form.render('select');
        });
    }

    function showAddDialog(){
        var loadIdx = layer.load(1);
        $.get('/api/accounts', function(){
            layer.close(loadIdx);
            layer.open({
                type: 1,
                title: '添加业务员',
                content: SALESMAN_DIALOG_HTML,
                area: ['600px', '450px'],
                success: function(layero){
                    layero.find('#salesman-form')[0].reset();
                    layero.find('#salesman-id').val('');
                    loadAccounts(layero);
                    form.render(null, 'salesman-form');
                }
            });
        });
    }

    function editSalesman(id){
        var idx = layer.load(1);
        $.get('/api/salesmen/' + id, function(res){
            hideLoading(idx);
            if(res.code == 0){
                var d = res.data;
                layer.open({
                    type: 1,
                    title: '编辑业务员',
                    content: SALESMAN_DIALOG_HTML,
                    area: ['600px', '450px'],
                    success: function(layero){
                        layero.find('#salesman-id').val(d.id);
                        layero.find('#salesman-name').val(d.name);
                        layero.find('#salesman-employee-id').val(d.employee_id);
                        layero.find('#salesman-phone').val(d.phone || '');
                        layero.find('#salesman-email').val(d.email || '');
                        layero.find('#salesman-active').prop('checked', d.is_active == 1);
                        loadAccounts(layero);
                        setTimeout(function(){
                            if(d.account_ids && d.account_ids.length > 0){
                                layero.find('#account-select').val(d.account_ids);
                                form.render('select');
                            }
                        }, 500);
                        form.render(null, 'salesman-form');
                    }
                });
            } else {
                layer.msg(res.msg || '加载失败', {icon:2});
            }
        });
    }

    function viewPerformance(id){
        var idx = layer.load(1);
        $.get('/api/salesmen/' + id + '/performance', function(res){
            layer.close(idx);
            if(res.code == 0){
                var d = res.data;
                var html = '<div class="layui-row layui-col-space10">';
                html += '<div class="layui-col-md6"><h3>基本信息</h3><p><strong>姓名：</strong>'+d.name+'</p><p><strong>工号：</strong>'+d.employee_id+'</p><p><strong>负责账号：</strong>'+d.account_count+' 个</p></div>';
                html += '<div class="layui-col-md6"><h3>业绩统计</h3><p><strong>本月回复数：</strong>'+d.monthly_replies+'</p><p><strong>本月群发数：</strong>'+d.monthly_broadcasts+'</p><p><strong>本月转化率：</strong>'+(d.conversion_rate || 0)+'%</p></div>';
                html += '</div><hr><h3>最近 30 天趋势</h3><div id="performance-chart" style="height:300px;"></div>';
                layer.open({
                    type: 1,
                    title: '业绩详情',
                    content: PERFORMANCE_DIALOG_HTML,
                    area: ['800px', '600px'],
                    success: function(layero){
                        layero.find('#performance-content').html(html);
                    }
                });
            } else {
                layer.msg(res.msg || '加载失败', {icon:2});
            }
        });
    }

    function deleteSalesman(id){
        layer.confirm('确定删除该业务员？', function(index){
            $.post('/api/salesmen/delete', {id:id}, function(res){
                if(res.code == 0){ layer.msg('删除成功', {icon:1}); tableIns.reload(); }
                else layer.msg(res.msg || '删除失败', {icon:2});
            });
            layer.close(index);
        });
    }

    form.on('submit(save-salesman)', function(data){
        var id = data.field.id;
        var url = id ? '/api/salesmen/update' : '/api/salesmen/add';
        data.field.account_ids = data.field.account_ids || [];
        $.ajax({
            url: url, type:'POST', contentType:'application/json',
            data: JSON.stringify(data.field),
            success: function(res){
                if(res.code == 0){ layer.msg('保存成功', {icon:1}); layer.closeAll(); tableIns.reload(); }
                else layer.msg(res.msg || '保存失败', {icon:2});
            }
        });
        return false;
    });
});
</script>
{% endraw %}
{% endblock %}
