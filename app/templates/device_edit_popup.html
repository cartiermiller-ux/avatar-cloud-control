<form class="layui-form" id="editDeviceForm" style="padding:20px;">
    <input type="hidden" name="id" value="{{dev.id}}">
    <div class="layui-form-item">
        <label class="layui-form-label">设备SN</label>
        <div class="layui-input-block">
            <input type="text" name="device_sn" lay-verify="required" value="{{dev.device_sn}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">设备名称</label>
        <div class="layui-input-block">
            <input type="text" name="device_name" lay-verify="required" value="{{dev.device_name}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">本机号码</label>
        <div class="layui-input-block">
            <input type="text" name="phone_number" lay-verify="required" value="{{dev.phone_number}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">归属分组</label>
        <div class="layui-input-block">
            <select name="group_id" lay-verify="required">
                {% for g in group_list %}
                <option value="{{g.id}}" {% if g.id == dev.group_id %}selected{% endif %}>{{g.group_name}}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">WiFi Calling</label>
        <div class="layui-input-block">
            <input type="radio" name="wifi_calling" value="1" title="开启" {% if dev.wifi_calling ==1 %}checked{% endif %}>
            <input type="radio" name="wifi_calling" value="0" title="关闭" {% if dev.wifi_calling ==0 %}checked{% endif %}>
        </div>
    </div>
    <div class="layui-form-item layui-text-center">
        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="submitEdit">保存修改</button>
    </div>
</form>
<script>
layui.use(['form','layer'],function(){
    var form = layui.form;
    form.on('submit(submitEdit)',function(data){
        var load = layer.load(2);
        $.post("/admin/device/edit",data.field,function(res){
            layer.close(load);
            if(res.code==200){
                layer.msg("修改成功",{time:1000},()=>layer.closeAll());
            }else{
                layer.msg(res.msg,{icon:2});
            }
        },"json");
        return false;
    });
});
</script>
