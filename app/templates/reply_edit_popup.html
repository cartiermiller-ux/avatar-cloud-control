<form class="layui-form" id="editReplyForm" style="padding:20px;">
    <input type="hidden" name="id" value="{{rule.id}}">
    <div class="layui-form-item">
        <label class="layui-form-label">规则名称</label>
        <div class="layui-input-block">
            <input type="text" name="rule_name" lay-verify="required" value="{{rule.rule_name}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">触发关键词</label>
        <div class="layui-input-block">
            <input type="text" name="match_keyword" lay-verify="required" value="{{rule.match_keyword}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">回复文字</label>
        <div class="layui-input-block">
            <textarea name="reply_text" lay-verify="required" rows="4" class="layui-textarea">{{rule.reply_text}}</textarea>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">回复图片地址</label>
        <div class="layui-input-block">
            <input type="text" name="reply_img" value="{{rule.reply_img}}" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">生效分组</label>
        <div class="layui-input-block">
            <select name="bind_group_ids" xm-select="replyGroup" xm-select-skin="default" multiple>
                {% set bindArr = rule.bind_group_ids.split(',') if rule.bind_group_ids else [] %}
                {% for g in group_list %}
                <option value="{{g.id}}" {% if g.id|string in bindArr %}selected{% endif %}>{{g.group_name}}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="layui-form-item layui-text-center">
        <button class="layui-btn layui-btn-normal" lay-submit lay-filter="submitEditReply">保存修改</button>
    </div>
</form>
<script src="https://cdn.jsdelivr.net/npm/layui-xm-select@0.2.1/dist/xm-select.js"></script>
<script>
layui.use(['form','layer','xmSelect'],function(){
    var form = layui.form;
    var xmSelect = layui.xmSelect;
    xmSelect.render({el:'[xm-select="replyGroup"]'});
    form.on('submit(submitEditReply)',function(data){
        var load = layer.load(2);
        $.post("/admin/reply/edit",data.field,res=>{
            layer.close(load);
            if(res.code == 200){
                layer.msg("修改成功",{time:1000},()=>layer.closeAll());
            }else{
                layer.msg(res.msg,{icon:2});
            }
        },"json");
        return false;
    });
});
</script>
