# ============================================================
# 阿凡达云控 - 生产环境配置
# ============================================================
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_DEBUG=false
      # 生产环境必须设置强密钥
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - SQLITE_PATH=data/textnow_factory.db
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8899
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - TN_PROXY=${TN_PROXY:-}
      - MATRIX_THREADS=${MATRIX_THREADS:-8}
      - MATRIX_BATCH_SIZE=${MATRIX_BATCH_SIZE:-100}
    restart: always
    volumes:
      # 生产环境使用命名卷
      - avatar-data:/app/data
      - avatar-uploads:/app/app/static/uploads
      - avatar-logs:/app/logs

# 命名卷定义
volumes:
  avatar-data:
    driver: local
  avatar-uploads:
    driver: local
  avatar-logs:
    driver: local