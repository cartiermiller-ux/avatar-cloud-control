server {
    listen 80;
    server_name 192.168.1.100 localhost;

    access_log /var/log/nginx/avatar_internal_access.log main;
    error_log /var/log/nginx/avatar_internal_error.log warn;

    # 设备WebSocket通道
    location /ws/device {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 客服聊天WebSocket通道
    location /ws/chat {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 接码API限流
    location /api/receive_code {
        proxy_pass http://127.0.0.1:5000;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # 所有页面、接口统一转发
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 内网限流规则
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;